<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Reset Password — Learnthru</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'DM Sans',sans-serif;background:#F2F4F8;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
    .box{background:white;border-radius:20px;padding:40px 36px;width:100%;max-width:420px;box-shadow:0 8px 40px rgba(0,0,0,0.08);}
    .logo{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:28px;}
    .logo-mark{width:40px;height:40px;background:linear-gradient(135deg,#5B67F5,#E85D8A);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;color:white;}
    .logo-name{font-size:18px;font-weight:700;color:#1A1D2E;}
    .icon-wrap{width:56px;height:56px;border-radius:16px;background:#EEF0FE;display:flex;align-items:center;justify-content:center;font-size:24px;color:#5B67F5;margin:0 auto 18px;}
    h2{font-size:20px;font-weight:700;color:#1A1D2E;text-align:center;margin-bottom:8px;}
    .sub{font-size:13px;color:#6B7280;text-align:center;line-height:1.6;margin-bottom:26px;}
    .form-group{margin-bottom:16px;}
    .form-label{display:block;font-size:11px;font-weight:700;color:#1A1D2E;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.4px;}
    .input-wrap{position:relative;}
    .input-wrap i{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#9CA3AF;font-size:13px;}
    .form-control{width:100%;padding:12px 14px 12px 40px;background:#F8F9FF;border:1.5px solid #EAECF0;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:13px;color:#1A1D2E;outline:none;transition:all 0.2s;}
    .form-control:focus{border-color:#5B67F5;background:white;box-shadow:0 0 0 3px rgba(91,103,245,0.08);}
    .btn{display:block;width:100%;padding:13px;background:linear-gradient(135deg,#5B67F5,#4C63D2);color:white;border:none;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all 0.2s;box-shadow:0 4px 14px rgba(91,103,245,0.28);text-align:center;}
    .btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(91,103,245,0.35);}
    .back{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:18px;font-size:13px;color:#6B7280;text-decoration:none;}
    .back:hover{color:#5B67F5;}
  </style>
</head>
<body>
<div class="box">
  <div class="logo">
    <div class="logo-mark"><i class="fas fa-graduation-cap"></i></div>
    <span class="logo-name">Learnthru</span>
  </div>
  <div class="icon-wrap"><i class="fas fa-key"></i></div>
  <h2>Forgot Password?</h2>
  <p class="sub">Enter your email address and we'll send you a link to reset your password.</p>
  <form method="post">
    {% csrf_token %}
    <div class="form-group">
      <label class="form-label">Email Address</label>
      <div class="input-wrap">
        <i class="fas fa-envelope"></i>
        <input type="email" name="email" class="form-control" placeholder="Enter your email" required>
      </div>
    </div>
    <button type="submit" class="btn"><i class="fas fa-paper-plane"></i> Send Reset Link</button>
  </form>
  <a href="/login/" class="back"><i class="fas fa-arrow-left"></i> Back to Sign In</a>
</div>
</body>
</html>
