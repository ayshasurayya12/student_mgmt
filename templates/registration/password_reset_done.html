<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Email Sent — Learnthru</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'DM Sans',sans-serif;background:#F2F4F8;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
    .box{background:white;border-radius:20px;padding:40px 36px;width:100%;max-width:420px;box-shadow:0 8px 40px rgba(0,0,0,0.08);text-align:center;}
    .logo{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:28px;}
    .logo-mark{width:40px;height:40px;background:linear-gradient(135deg,#5B67F5,#E85D8A);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;color:white;}
    .logo-name{font-size:18px;font-weight:700;color:#1A1D2E;}
    .icon-wrap{width:64px;height:64px;border-radius:50%;background:#D1FAE5;display:flex;align-items:center;justify-content:center;font-size:28px;color:#10B981;margin:0 auto 18px;}
    h2{font-size:20px;font-weight:700;color:#1A1D2E;margin-bottom:10px;}
    .sub{font-size:13px;color:#6B7280;line-height:1.7;margin-bottom:24px;}
    .info-box{background:#F8F9FF;border-radius:12px;padding:16px;margin-bottom:24px;font-size:13px;color:#6B7280;line-height:1.6;}
    .info-box strong{color:#1A1D2E;}
    .btn{display:block;width:100%;padding:13px;background:linear-gradient(135deg,#5B67F5,#4C63D2);color:white;border:none;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;text-decoration:none;transition:all 0.2s;box-shadow:0 4px 14px rgba(91,103,245,0.28);}
    .btn:hover{transform:translateY(-1px);}
  </style>
</head>
<body>
<div class="box">
  <div class="logo">
    <div class="logo-mark"><i class="fas fa-graduation-cap"></i></div>
    <span class="logo-name">Learnthru</span>
  </div>
  <div class="icon-wrap"><i class="fas fa-envelope-open-text"></i></div>
  <h2>Check Your Email</h2>
  <p class="sub">We've sent a password reset link to your email address. Please check your inbox.</p>
  <div class="info-box">
    <strong>Didn't receive the email?</strong><br>
    Check your spam/junk folder. The link expires in <strong>24 hours</strong>.
  </div>
  <a href="/login/" class="btn"><i class="fas fa-arrow-left"></i> Back to Sign In</a>
</div>
</body>
</html>
