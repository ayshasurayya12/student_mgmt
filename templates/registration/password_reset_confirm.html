<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Set New Password — Learnthru</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'DM Sans',sans-serif;background:#F2F4F8;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
    .box{background:white;border-radius:20px;padding:40px 36px;width:100%;max-width:420px;box-shadow:0 8px 40px rgba(0,0,0,0.08);}
    .logo{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:28px;}
    .logo-mark{width:40px;height:40px;background:linear-gradient(135deg,#5B67F5,#E85D8A);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;color:white;}
    .logo-name{font-size:18px;font-weight:700;color:#1A1D2E;}
    .icon-wrap{width:56px;height:56px;border-radius:16px;background:#EEF0FE;display:flex;align-items:center;justify-content:center;font-size:24px;color:#5B67F5;margin:0 auto 18px;}
    h2{font-size:20px;font-weight:700;color:#1A1D2E;text-align:center;margin-bottom:8px;}
    .sub{font-size:13px;color:#6B7280;text-align:center;line-height:1.6;margin-bottom:26px;}
    .form-group{margin-bottom:16px;}
    .form-label{display:block;font-size:11px;font-weight:700;color:#1A1D2E;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.4px;}
    .input-wrap{position:relative;}
    .input-wrap i.ico{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#9CA3AF;font-size:13px;}
    .toggle-pw{position:absolute;right:14px;top:50%;transform:translateY(-50%);color:#9CA3AF;font-size:13px;cursor:pointer;background:none;border:none;}
    .form-control{width:100%;padding:12px 40px 12px 40px;background:#F8F9FF;border:1.5px solid #EAECF0;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:13px;color:#1A1D2E;outline:none;transition:all 0.2s;}
    .form-control:focus{border-color:#5B67F5;background:white;box-shadow:0 0 0 3px rgba(91,103,245,0.08);}
    .btn{display:block;width:100%;padding:13px;background:linear-gradient(135deg,#5B67F5,#4C63D2);color:white;border:none;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all 0.2s;box-shadow:0 4px 14px rgba(91,103,245,0.28);text-align:center;margin-top:4px;}
    .btn:hover{transform:translateY(-1px);}
    .invalid-box{background:#FEE2E2;border-radius:12px;padding:16px;text-align:center;}
    .invalid-box p{font-size:13px;color:#991B1B;margin-bottom:12px;}
    .invalid-box a{color:#5B67F5;font-weight:600;font-size:13px;}
    ul.errorlist{list-style:none;margin:6px 0 0;padding:0;}
    ul.errorlist li{font-size:12px;color:#DC2626;margin-top:4px;}
  </style>
</head>
<body>
<div class="box">
  <div class="logo">
    <div class="logo-mark"><i class="fas fa-graduation-cap"></i></div>
    <span class="logo-name">Learnthru</span>
  </div>
  <div class="icon-wrap"><i class="fas fa-lock"></i></div>
  <h2>Set New Password</h2>
  <p class="sub">Choose a strong password for your account.</p>

  {% if validlink %}
  <form method="post">
    {% csrf_token %}
    <div class="form-group">
      <label class="form-label">New Password</label>
      <div class="input-wrap">
        <i class="fas fa-lock ico"></i>
        <input type="password" name="new_password1" id="pw1" class="form-control" placeholder="Enter new password" required>
        <button type="button" class="toggle-pw" onclick="togglePw('pw1',this)"><i class="fas fa-eye"></i></button>
      </div>
      {{ form.new_password1.errors }}
    </div>
    <div class="form-group">
      <label class="form-label">Confirm Password</label>
      <div class="input-wrap">
        <i class="fas fa-lock ico"></i>
        <input type="password" name="new_password2" id="pw2" class="form-control" placeholder="Confirm new password" required>
        <button type="button" class="toggle-pw" onclick="togglePw('pw2',this)"><i class="fas fa-eye"></i></button>
      </div>
      {{ form.new_password2.errors }}
    </div>
    <button type="submit" class="btn"><i class="fas fa-check"></i> Set New Password</button>
  </form>
  {% else %}
  <div class="invalid-box">
    <p>This password reset link is invalid or has expired.</p>
    <a href="/password-reset/">Request a new reset link →</a>
  </div>
  {% endif %}
</div>
<script>
  function togglePw(id, btn) {
    const input = document.getElementById(id);
    const icon = btn.querySelector('i');
    if (input.type === 'password') { input.type = 'text'; icon.className = 'fas fa-eye-slash'; }
    else { input.type = 'password'; icon.className = 'fas fa-eye'; }
  }
</script>
</body>
</html>
